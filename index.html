<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Aim Trainer</title>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow: hidden; /* 스크롤 방지 */
        }
        #stats {
            margin-top: 20px;
            font-size: clamp(20px, 4vw, 28px); /* 반응형 폰트 크기 */
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        #game-board {
            position: relative;
            width: 90vw;
            height: 70vh; /* 화면 크기에 맞게 조정 */
            background-color: #1e1e1e;
            margin-top: 15px;
            border: 3px solid #333;
            cursor: crosshair;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .target {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ff4757 30%, #ff6b81 100%);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ff4757;
            /* 클릭 시 애니메이션 제거 (자바스크립트로 처리) */
        }
        .hit-effect {
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: transparent;
            border: 2px solid #00ff88;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* 클릭 방해 금지 */
            animation: expandFade 0.3s ease-out forwards;
        }
        @keyframes expandFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        #controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 30px;
            font-size: clamp(16px, 3vw, 22px);
            background-color: #00ff88;
            border: none;
            color: #121212;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        button:hover:not(:disabled) {
            background-color: #00cc6e;
            box-shadow: 0 0 20px #00ff88;
        }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
        /* 모바일 터치 대응 */
        @media (max-width: 768px) {
            .target {
                width: 45px; /* 모바일에서는 터치하기 쉽게 크기 증가 */
                height: 45px;
            }
        }
    </style>
</head>
<body>

    <div id="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div>TIME: <span id="timer">60</span>s</div>
    </div>
    
    <div id="controls">
        <button id="start-btn">훈련 시작</button>
    </div>

    <div id="game-board"></div>

    <script>
        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval;
        let spawnTimeout;

        // 효과음 (Web Audio API 사용으로 외부 파일 의존성 제거)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playHitSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // 시작 주파수
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05); // 끝 주파수
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function getSpawnDelay() {
            // 전체 시간 60초 기준, 진행도 (0.0 ~ 1.0)
            const progress = (60 - timeLeft) / 60; 
            // Math.pow(progress, 2)를 사용하여 후반부로 갈수록 급격히 빨라지는 가속도 적용
            // 시작 1.5초(1500ms) -> 끝 0.3초(300ms)
            const delay = 1500 - (Math.pow(progress, 2) * 1200); 
            return Math.max(300, delay); // 최소 0.3초 보장
        }

        function createHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = `${x}px`;
            effect.style.top = `${y}px`;
            board.appendChild(effect);
            
            // 애니메이션 끝나면 제거
            setTimeout(() => {
                if (board.contains(effect)) {
                    board.removeChild(effect);
                }
            }, 300);
        }

        function spawnTarget() {
            if (!gameActive) return;

            // 기존 타겟만 제거 (hit-effect는 남겨둠)
            const oldTarget = board.querySelector('.target');
            if (oldTarget) {
                board.removeChild(oldTarget);
            }
            clearTimeout(spawnTimeout);

            const target = document.createElement('div');
            target.className = 'target';

            // 타겟 크기를 고려하여 경계선 밖으로 나가지 않도록 좌표 계산
            const targetSize = window.innerWidth <= 768 ? 45 : 35; // CSS 미디어 쿼리와 동기화
            const x = Math.random() * (board.clientWidth - targetSize * 2) + targetSize;
            const y = Math.random() * (board.clientHeight - targetSize * 2) + targetSize;

            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // 클릭 이벤트 (PC)
            target.addEventListener('mousedown', handleHit);
            // 터치 이벤트 (모바일)
            target.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 스크롤 등 기본 터치 동작 방지
                handleHit(e);
            });

            function handleHit(e) {
                e.stopPropagation(); // 게임 보드 클릭 이벤트로 전파 방지
                
                // 타겟 중앙 좌표 계산을 위해 직접 x, y 사용 (터치 좌표보다 정확함)
                createHitEffect(x, y);
                playHitSound();

                score++;
                scoreDisplay.innerText = score;
                spawnTarget(); // 맞추면 즉시 다음 타겟
            }

            board.appendChild(target);

            // 난이도에 따른 자동 소멸 및 재생성
            spawnTimeout = setTimeout(() => {
                if (gameActive) spawnTarget();
            }, getSpawnDelay());
        }

        function startGame() {
            // AudioContext는 사용자 상호작용 후 시작해야 함
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            score = 0;
            timeLeft = 60;
            gameActive = true;
            scoreDisplay.innerText = score;
            timerDisplay.innerText = timeLeft;
            startBtn.disabled = true;
            board.innerHTML = ''; // 보드 초기화

            spawnTarget();

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(spawnTimeout);
            board.innerHTML = '';
            startBtn.disabled = false;
            
            // 커스텀 알림 모달 대신 간단한 alert 사용 (요청에 따라)
            setTimeout(() => {
                alert(`훈련 종료!\n최종 점수: ${score}\n수고하셨습니다, 요원.`);
            }, 100);
        }

        startBtn.addEventListener('click', startGame);

        // 오답(배경) 클릭 시 패널티(선택 사항) 또는 시각 효과 추가 가능
        /*
        board.addEventListener('mousedown', (e) => {
            if(gameActive && e.target === board) {
                // 놓쳤을 때의 처리
            }
        });
        */
    </script>
</body>
</html>
